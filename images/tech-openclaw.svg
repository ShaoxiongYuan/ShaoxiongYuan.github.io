<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0e17"/>
      <stop offset="100%" style="stop-color:#131722"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/><line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="630" x2="1200" y2="630"/>
  </g>

  <!-- Glowing orbs -->
  <circle cx="200" cy="150" r="200" fill="#00d4ff" opacity="0.04" filter="url(#blur1)"/>
  <circle cx="1000" cy="500" r="180" fill="#a78bfa" opacity="0.04" filter="url(#blur1)"/>
  <circle cx="600" cy="315" r="120" fill="#22d3a7" opacity="0.03" filter="url(#blur2)"/>

  <!-- Lobster emoji / claw icon -->
  <text x="600" y="260" text-anchor="middle" font-size="120" opacity="0.9">🦞</text>

  <!-- Title -->
  <text x="600" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#ffffff">OpenClaw</text>

  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="300" fill="#6e7a91">The Autonomous AI Agent Redefining How We Work</text>

  <!-- Stats bar -->
  <g transform="translate(600, 480)" text-anchor="middle">
    <text x="-300" font-family="monospace" font-size="11" fill="#00d4ff" letter-spacing="2">214K+ STARS</text>
    <text x="-120" font-family="monospace" font-size="11" fill="#3e4759">·</text>
    <text x="0" font-family="monospace" font-size="11" fill="#00d4ff" letter-spacing="2">400K USERS</text>
    <text x="120" font-family="monospace" font-size="11" fill="#3e4759">·</text>
    <text x="300" font-family="monospace" font-size="11" fill="#00d4ff" letter-spacing="2">OPEN SOURCE</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="520" y="520" width="160" height="2" rx="1" fill="url(#glow)" opacity="0.6"/>

  <!-- Category badge -->
  <g transform="translate(600, 560)">
    <rect x="-55" y="-12" width="110" height="24" rx="3" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
    <text text-anchor="middle" y="4" font-family="monospace" font-size="9" fill="#00d4ff" letter-spacing="2" opacity="0.7">MARCH 2026</text>
  </g>
</svg>
