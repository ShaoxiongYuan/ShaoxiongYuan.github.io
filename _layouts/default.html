<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #f7f4ef;
      --paper:   #fffdf9;
      --ink:     #1a1713;
      --muted:   #6b6459;
      --rule:    #e2ddd6;
      --accent:  #b85c30;
      --accent2: #4a7c6f;
      --serif:   'Lora', Georgia, serif;
      --sans:    'DM Sans', system-ui, sans-serif;
      --mono:    'DM Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── Layout ──────────────────────────────────────── */
    .site-wrap {
      display: grid;
      grid-template-columns: 240px 1fr;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }

    /* ── Sidebar ─────────────────────────────────────── */
    .sidebar {
      grid-row: 1 / -1;
      background: var(--ink);
      color: var(--cream);
      padding: 2.5rem 1.75rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .sidebar-name {
      font-family: var(--serif);
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.3;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .sidebar-name span {
      display: block;
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #a09890;
      margin-top: 0.35rem;
    }

    .sidebar-divider {
      border: none;
      border-top: 1px solid #3a3530;
    }

    .sidebar-section-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #7a7068;
      margin-bottom: 0.6rem;
    }

    .sidebar nav ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .sidebar nav ul li a {
      display: block;
      font-size: 0.875rem;
      color: #c8c0b8;
      text-decoration: none;
      padding: 0.3rem 0.5rem;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
    }

    .sidebar nav ul li a:hover {
      background: #2e2a26;
      color: #fff;
    }

    .sidebar-contact {
      margin-top: auto;
      font-size: 0.78rem;
      color: #7a7068;
    }

    .sidebar-contact a {
      color: #a09080;
      text-decoration: none;
      transition: color 0.15s;
    }

    .sidebar-contact a:hover { color: var(--accent); }

    /* ── Main ────────────────────────────────────────── */
    .main-content {
      background: var(--paper);
      padding: 3.5rem 4rem;
      max-width: 860px;
      width: 100%;
    }

    /* ── Typography ──────────────────────────────────── */
    .main-content h1 {
      font-family: var(--serif);
      font-size: 2.1rem;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .main-content h2 {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--ink);
      margin-top: 3rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--rule);
    }

    .main-content h3 {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 600;
      font-style: italic;
      color: var(--ink);
      margin-top: 1.75rem;
      margin-bottom: 0.4rem;
    }

    .main-content h4 {
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 1.25rem;
      margin-bottom: 0.4rem;
    }

    .main-content p {
      margin-bottom: 1rem;
      color: #2e2a26;
    }

    .main-content a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.15s;
    }

    .main-content a:hover { color: #8a3a18; }

    .main-content strong { font-weight: 600; color: var(--ink); }
    .main-content em { font-style: italic; }

    .main-content hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 2.5rem 0;
    }

    /* ── Lists ───────────────────────────────────────── */
    .main-content ol, .main-content ul {
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }

    .main-content li {
      margin-bottom: 0.4rem;
      color: #2e2a26;
    }

    /* ── Tables ──────────────────────────────────────── */
    .main-content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      margin: 1.25rem 0 1.75rem;
    }

    .main-content thead tr {
      background: var(--ink);
      color: var(--cream);
    }

    .main-content thead th {
      padding: 0.6rem 0.85rem;
      text-align: left;
      font-family: var(--sans);
      font-weight: 500;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .main-content tbody tr {
      border-bottom: 1px solid var(--rule);
      transition: background 0.1s;
    }

    .main-content tbody tr:hover { background: #f0ece6; }

    .main-content td {
      padding: 0.55rem 0.85rem;
      vertical-align: top;
    }

    /* ── Code ────────────────────────────────────────── */
    .main-content code {
      font-family: var(--mono);
      font-size: 0.82em;
      background: #efeae3;
      padding: 0.15em 0.4em;
      border-radius: 3px;
      color: #3a2e26;
    }

    .main-content pre {
      background: var(--ink);
      color: #d4cfc8;
      padding: 1.25rem 1.5rem;
      border-radius: 6px;
      overflow-x: auto;
      margin: 1.5rem 0;
      font-family: var(--mono);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .main-content pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    /* ── Blockquote ──────────────────────────────────── */
    .main-content blockquote {
      border-left: 3px solid var(--accent);
      margin: 1.75rem 0;
      padding: 0.75rem 1.5rem;
      background: #f5f0e8;
      border-radius: 0 4px 4px 0;
    }

    .main-content blockquote p {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.05rem;
      color: var(--muted);
      margin: 0;
    }

    /* ── Details/Summary ─────────────────────────────── */
    .main-content details {
      margin: 0.5rem 0;
    }

    .main-content summary {
      cursor: pointer;
      padding: 0.4rem 0;
      color: var(--accent2);
      font-weight: 500;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .main-content summary::before {
      content: '▶';
      font-size: 0.65rem;
      transition: transform 0.2s;
    }

    .main-content details[open] summary::before {
      transform: rotate(90deg);
    }

    /* ── Page intro strip ────────────────────────────── */
    .page-intro {
      padding-bottom: 1.75rem;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid var(--rule);
    }

    .page-intro p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ── Footer ──────────────────────────────────────── */
    footer {
      grid-column: 2;
      background: var(--paper);
      border-top: 1px solid var(--rule);
      padding: 1.25rem 4rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    footer a { color: var(--muted); }
    footer a:hover { color: var(--accent); }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 768px) {
      .site-wrap {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        grid-row: auto;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        padding: 1.25rem 1.5rem;
        gap: 1rem;
      }

      .sidebar-contact { margin-top: 0; }

      .main-content {
        padding: 2rem 1.5rem;
      }

      footer { grid-column: 1; padding: 1rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="site-wrap">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div>
        <div class="sidebar-name">
          Shaoxiong (Steven) Yuan
          <span>UCLA MFE 2025 · USC Class of 2024</span>
        </div>
      </div>

      <hr class="sidebar-divider" />

      <div>
        <div class="sidebar-section-label">USC Courses</div>
        <nav>
          <ul>
            <li><a href="{{ '/' | relative_url }}#for-math">Mathematics</a></li>
            <li><a href="{{ '/' | relative_url }}#for-cs">Computer Science</a></li>
          </ul>
        </nav>
      </div>

      <div>
        <div class="sidebar-section-label">UCLA Courses</div>
        <nav>
          <ul>
            <li><a href="{{ '/' | relative_url }}#ucla-coursework">Financial Engineering</a></li>
          </ul>
        </nav>
      </div>

      <div>
        <div class="sidebar-section-label">More</div>
        <nav>
          <ul>
            <li><a href="{{ '/movie-reviews' | relative_url }}">Movie Reviews</a></li>
            <li><a href="{{ '/' | relative_url }}#personal-projects">Personal Projects</a></li>
          </ul>
        </nav>
      </div>

      <div class="sidebar-contact">
        <a href="mailto:ysxstevenpp123@gmail.com">ysxstevenpp123@gmail.com</a>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      {{ content }}
    </main>

    <!-- Footer -->
    <footer>
      Shaoxiong (Steven) Yuan
    </footer>

  </div>
</body>
</html>
