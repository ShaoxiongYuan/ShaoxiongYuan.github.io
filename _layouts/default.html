<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    /* Reset & Base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      display: flex;
      min-height: 100vh;
    }

    a { color: #d4af7a; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: #111;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 0 2rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-name {
      font-size: 1rem;
      font-weight: 600;
      color: #f0ece4;
      padding: 0 1.25rem 1.25rem;
      border-bottom: 1px solid #2a2a2a;
      margin-bottom: 1rem;
      letter-spacing: 0.01em;
    }

    .sidebar-name a {
      color: #f0ece4;
      text-decoration: none;
    }
    .sidebar-name a:hover { color: #d4af7a; }

    .nav-group { margin-bottom: 0.25rem; }

    .nav-group-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
      padding: 0.6rem 1.25rem 0.3rem;
    }

    .nav-link {
      display: block;
      padding: 0.38rem 1.25rem 0.38rem 1.6rem;
      font-size: 0.88rem;
      color: #b0b0b0;
      transition: color 0.15s, background 0.15s;
    }

    .nav-link:hover {
      color: #f0ece4;
      background: #1e1e1e;
      text-decoration: none;
    }

    /* ── Degree block (used in index.md) ── */
    .degree-block {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .degree-row {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .degree-logo {
      height: 34px;
      width: auto;
      object-fit: contain;
      flex-shrink: 0;
      filter: brightness(0) invert(1);
      opacity: 0.8;
    }

    .degree-text { text-align: right; flex: 1; }

    .degree-text strong {
      display: block;
      font-size: 0.92rem;
      color: #f0ece4;
      font-weight: 600;
      line-height: 1.35;
    }

    .degree-text span {
      display: block;
      font-size: 0.8rem;
      color: #777;
      margin-top: 0.2rem;
    }

    /* ── Main content ── */
    .main-content {
      flex: 1;
      padding: 2.5rem 3rem;
      max-width: 900px;
      overflow-x: hidden;
    }

    .main-content h1 {
      font-size: 1.7rem;
      font-weight: 700;
      color: #f0ece4;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .main-content h2 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #d4af7a;
      margin: 2rem 0 0.75rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid #2a2a2a;
    }

    .main-content h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #ccc;
      margin: 1.25rem 0 0.4rem;
    }

    .main-content p {
      line-height: 1.7;
      color: #bbb;
      margin-bottom: 0.75rem;
      font-size: 0.92rem;
    }

    .main-content hr {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 1.5rem 0;
    }

    /* Tables */
    .main-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.75rem 0 1rem;
      font-size: 0.88rem;
    }

    .main-content th {
      text-align: left;
      padding: 0.4rem 0.75rem;
      background: #1e1e1e;
      color: #888;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 1px solid #2a2a2a;
    }

    .main-content td {
      padding: 0.45rem 0.75rem;
      border-bottom: 1px solid #222;
      color: #ccc;
      vertical-align: top;
    }

    .main-content tr:last-child td { border-bottom: none; }
    .main-content tr:hover td { background: #1c1c1c; }

    /* Details / Accordion */
    .main-content details {
      margin: 0.4rem 0;
      border: 1px solid #252525;
      border-radius: 4px;
      overflow: hidden;
    }

    .main-content summary {
      cursor: pointer;
      padding: 0.6rem 0.9rem;
      background: #1a1a1a;
      font-size: 0.9rem;
      color: #d0d0d0;
      list-style: none;
      user-select: none;
      transition: background 0.15s;
    }

    .main-content summary::-webkit-details-marker { display: none; }

    .main-content summary::after {
      content: '+';
      float: right;
      color: #555;
      font-size: 1rem;
      font-weight: 300;
    }

    .main-content details[open] summary::after { content: '−'; }
    .main-content details[open] summary { background: #1e1e1e; color: #f0ece4; }
    .main-content details > *:not(summary) { padding: 0.75rem 1rem; background: #161616; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .main-content > * { animation: fadeUp 0.4s ease both; }
    .main-content > *:nth-child(1) { animation-delay: 0.05s; }
    .main-content > *:nth-child(2) { animation-delay: 0.10s; }
    .main-content > *:nth-child(3) { animation-delay: 0.15s; }
    .main-content > *:nth-child(4) { animation-delay: 0.20s; }
    .main-content > *:nth-child(5) { animation-delay: 0.25s; }

    /* Responsive */
    @media (max-width: 700px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; padding: 1rem; border-right: none; border-bottom: 1px solid #2a2a2a; }
      .main-content { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav class="sidebar">
    <div class="sidebar-name">
      <a href="/">Shaoxiong (Steven) Yuan</a>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">USC Courses</div>
      <a class="nav-link" href="/#usc-coursework">Mathematics</a>
      <a class="nav-link" href="/#for-cs">Computer Science</a>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">UCLA Courses</div>
      <a class="nav-link" href="/#ucla-coursework">Financial Engineering</a>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">More</div>
      <a class="nav-link" href="/movie-reviews">Movie Reviews</a>
      <a class="nav-link" href="/#personal-projects">Personal Projects</a>
    </div>
  </nav>

  <main class="main-content">
    {{ content }}
  </main>

</body>
</html>
